services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: guiyang_oj_postgres
    environment:
      POSTGRES_DB: guiyang_oj
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - guiyang_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: guiyang_oj_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - guiyang_network

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guiyang_oj_backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: guiyang_oj
      DB_USER: postgres
      DB_PASSWORD: postgres123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: mgJr+op91DSZOG17gWx2sPYTdbk09DC0AdE7YCtyMtgtVuk/osI14+KW+v3Os3UkfJgp3L5nwmZJugQauLv14g==
      JWT_REFRESH_SECRET: QGVhyNuSuMkl+MO88NAEDZ/yCqXqJWcHzrIoyCTHJX3ukBcTmNDtQHbTYLu2SEDziRA3dmvVM2uhED0O0eGFOQ==
      SESSION_SECRET: 5NaIDq0BGigN3x2FBTkfvfqDtvohHigZmjdss/jGXAQ=
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:80,http://localhost,http://127.0.0.1:3000,http://127.0.0.1:80,http://127.0.0.1
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - ./config:/app/config
      - /app/node_modules
    networks:
      - guiyang_network

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: guiyang_oj_frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - guiyang_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: guiyang_oj_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - frontend
      - backend
    networks:
      - guiyang_network

  # pgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: guiyang_oj_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@guiyang.edu
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - guiyang_network

volumes:
  postgres_data:
  redis_data:

networks:
  guiyang_network:
    driver: bridge